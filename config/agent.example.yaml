# Bridge Agent configuration example.
# Copy this file to agent.yaml and edit before running.

device:
  id: raspberry-pi          # Unique identifier — used as device_id in all messages.
                            # Must be lowercase; no spaces (e.g. raspberry-pi, my-laptop).
  name: Raspberry Pi        # Human-readable display name shown in the UI.

tools:
  codex:
    cmd: codex              # OpenAI Codex CLI binary.
    args: ["exec", "--full-auto"]   # Add --skip-git-repo-check if your workspace is not a git repo.
    continue_args: []       # Leave empty for now; per-chat Codex resume needs explicit session-id handling.
    working_dir: ..         # Optional cwd for tool execution; relative paths resolve from this config file.
    fallback_tool: openclaw # If codex binary is missing, try this tool instead.

  openclaw:
    cmd: openclaw           # Binary that must be on PATH on this device.
    args: []                # Extra args passed before the message. Use ["-p"] for one-shot CLIs like claude.
    continue_args: []       # Optional args for follow-up turns, e.g. ["--continue", "-p"] for Claude CLI.
    working_dir: .          # Optional; omit to inherit the agent process working directory.
    # fallback_tool: claude  # Uncomment to chain further fallbacks.

  # Claude Code CLI — direct mode (captures stdout, no tmux pane scanning).
  # Use direct: true for any one-shot CLI that reads stdin/args and prints to stdout.
  # claude:
  #   cmd: claude
  #   args: ["-p"]
  #   continue_args: ["--continue", "-p"]
  #   direct: true

default_tool: codex         # Tool used when the UI sends a message with no explicit tool.
                            # Also the final fallback if a tool's binary is missing and no
                            # fallback_tool is configured.

gateway:
  url: ws://100.x.x.x:8080/agent   # Gateway WebSocket URL. Replace IP with your
                                    # Tailscale address or hostname.

name: release-agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-agent-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build agent release
        run: bash scripts/package-agent-release.sh "${GITHUB_REF_NAME}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bridge-agent_${{ github.ref_name }}/*.tar.gz
            dist/bridge-agent_${{ github.ref_name }}/SHA256SUMS.txt

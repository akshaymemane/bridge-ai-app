name: release-app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-app-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build app release
        run: bash scripts/package-app-release.sh "${GITHUB_REF_NAME}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bridge-app_${{ github.ref_name }}/*.tar.gz
            dist/bridge-app_${{ github.ref_name }}/SHA256SUMS.txt
